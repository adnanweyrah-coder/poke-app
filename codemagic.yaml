workflows:
  ios-workflow:
    name: POKE iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.adnansaid.poke
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Capacitor
        script: |
          npm install -g @capacitor/cli
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/ios
      - name: Init Capacitor project
        script: |
          npx cap init "POKE Space Survivor" com.adnansaid.poke --web-dir .
          npx cap add ios
          npx cap copy ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles --create
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: 2P3S5ZULSS
        issuer_id: 2462f739-654f-4602-aa41-15627776e739
        submit_to_testflight: false
        submit_to_app_store: true
